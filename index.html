<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Badge Verification — Sehatra</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: system-ui, -apple-system, sans-serif;
    background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}
.card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    padding: 40px;
    max-width: 480px;
    width: 100%;
    text-align: center;
}
h1 {
    font-size: 20px;
    color: #334e68;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
h1 span { font-size: 28px; }
.status-badge {
    display: inline-block;
    padding: 6px 18px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 20px;
}
.valid { background: #e3fcef; color: #0d7c3f; }
.expired { background: #ffe0e0; color: #b91c1c; }
.not-found { background: #f0f0f0; color: #666; }
.loading { background: #e8f0fe; color: #1967d2; }
.info { margin: 20px 0; text-align: left; }
.info-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
    font-size: 15px;
}
.info-row:last-child { border-bottom: none; }
.label { color: #8899aa; }
.value { color: #1a2a3a; font-weight: 500; }
.seal {
    margin-top: 24px;
    font-size: 48px;
}
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #8899aa;
}
.error { color: #b91c1c; margin: 16px 0; }
</style>
</head>
<body>
<div class="card">
    <h1><span>🔍</span> Badge Verification</h1>
    <div id="status" class="status-badge loading">Loading...</div>
    <div id="details"></div>
    <div id="seal" class="seal"></div>
    <div class="footer">Sehatra ID Badge System</div>
</div>

<script>
// ═══════════════════════════════════════════
// ✏️  SETUP — Fill these before uploading to GitHub Pages
// ═══════════════════════════════════════════
const SUPABASE_URL = '';
const SUPABASE_ANON_KEY = '';

// ═══════════════════════════════════════════

function getParam(name) {
    const p = new URLSearchParams(window.location.search);
    return p.get(name);
}

function esc(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
}

function isExpired(validDate) {
    if (!validDate) return false;
    const today = new Date();
    today.setHours(0,0,0,0);
    return new Date(validDate + 'T00:00:00') < today;
}

function fmtDate(d) {
    if (!d) return '—';
    const [y,m,day] = d.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return day + ' ' + months[parseInt(m)-1] + ' ' + y;
}

async function verify() {
    const id = getParam('id');
    const statusEl = document.getElementById('status');
    const detailsEl = document.getElementById('details');
    const sealEl = document.getElementById('seal');

    if (!id) {
        statusEl.className = 'status-badge not-found';
        statusEl.textContent = 'No ID provided';
        detailsEl.innerHTML = '<p class="error">Missing badge ID in URL</p>';
        return;
    }

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
        statusEl.className = 'status-badge not-found';
        statusEl.textContent = 'Not Configured';
        detailsEl.innerHTML = '<p class="error">Verification system is not configured yet.</p>';
        return;
    }

    try {
        const res = await fetch(SUPABASE_URL + '/rest/v1/badges?id=eq.' + encodeURIComponent(id) + '&select=*', {
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
            }
        });

        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        if (!data || data.length === 0) {
            statusEl.className = 'status-badge not-found';
            statusEl.textContent = 'Not Found';
            detailsEl.innerHTML = '<p class="error">No badge found with ID: ' + esc(id) + '</p>';
            sealEl.textContent = '❓';
            return;
        }

        const badge = data[0];
        const expired = isExpired(badge.valid_date);

        statusEl.className = 'status-badge ' + (expired ? 'expired' : 'valid');
        statusEl.textContent = expired ? '⛔ Expired' : '✅ Valid';

        detailsEl.innerHTML =
            '<div class="info">' +
            '<div class="info-row"><span class="label">ID</span><span class="value">' + esc(badge.id) + '</span></div>' +
            '<div class="info-row"><span class="label">Name</span><span class="value">' + esc(badge.name) + '</span></div>' +
            '<div class="info-row"><span class="label">Designation</span><span class="value">' + esc(badge.designation) + '</span></div>' +
            (badge.department ? '<div class="info-row"><span class="label">Department</span><span class="value">' + esc(badge.department) + '</span></div>' : '') +
            (badge.issue_date ? '<div class="info-row"><span class="label">Issue Date</span><span class="value">' + fmtDate(badge.issue_date) + '</span></div>' : '') +
            (badge.valid_date ? '<div class="info-row"><span class="label">Valid Until</span><span class="value">' + fmtDate(badge.valid_date) + '</span></div>' : '') +
            (badge.clinic_name ? '<div class="info-row"><span class="label">Issuer</span><span class="value">' + esc(badge.clinic_name) + '</span></div>' : '') +
            '</div>';

        sealEl.textContent = expired ? '⛔' : '✅';

    } catch(e) {
        console.error(e);
        statusEl.className = 'status-badge not-found';
        statusEl.textContent = 'Error';
        detailsEl.innerHTML = '<p class="error">Could not verify badge. Please try again.</p>';
        sealEl.textContent = '⚠️';
    }
}

verify();
</script>
</body>
</html>
